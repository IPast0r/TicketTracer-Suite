<h2 mat-dialog-title>Delete item</h2>
<mat-dialog-content>
    <p>Are you shure you want to delete this item?</p>
</mat-dialog-content>

<div mat-dialog-actions>
    <button mat-button class="addBtn" (click)="delete()">
        <mat-icon>delete</mat-icon>Delete
    </button>
    <button mat-button class="addBtn" (click)="onCancel()" cdkFocusInitial>
        <mat-icon>cancel</mat-icon>Cancel
    </button>
</div>
