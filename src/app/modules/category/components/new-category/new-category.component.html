<h2 mat-dialog-title>{{formState}} category</h2>
<mat-dialog-content>

    <form [formGroup]="categoryForm">
        <div class="category-container">
            <mat-form-field>
                <input matInput placeholder="Name" formControlName="name" required>
            </mat-form-field>
            
            <mat-form-field>
                <input matInput placeholder="Description" formControlName="description" required>
            </mat-form-field>

        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions>
    <button mat-button class="addBtn" (click)="onSave()" [disabled]="categoryForm.invalid">
        <mat-icon>save</mat-icon>Save
    </button>
    <button mat-button class="addBtn" (click)="onCancel()">
        <mat-icon>cancel</mat-icon>Cancel
    </button>

</mat-dialog-actions>
